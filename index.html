<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nano Call - console</title>
  <script>(function(){var t=localStorage.getItem('nano-call.theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <main class="phone">
    <header class="bar">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
      <h1><span id="brandName">Nano Call</span> <span class="barTag">console</span></h1>
      <span class="dot" id="netDot" title="Connection to your call server"></span>
    </header>

    <!-- 1. log in (admin password) and go online -->
    <section id="login" class="screen">
      <p class="lede">Go online to receive calls. Keep this page open - it is your phone being on the hook.</p>
      <label for="adminPass">Admin password</label>
      <div class="pwWrap">
        <input id="adminPass" type="password" autocomplete="current-password" placeholder="your admin password" />
        <button type="button" id="pwPeek" class="pwPeek" aria-label="Show password" aria-pressed="false" title="Show password">
          <svg class="ic-eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5C6 5 2.7 9.6 1.5 12 2.7 14.4 6 19 12 19s9.3-4.6 10.5-7C21.3 9.6 18 5 12 5zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
          <svg class="ic-eye-off hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 4.3 3.3 3l17.7 17.7-1.3 1.3-3-3c-1.4.5-3 .7-4.7.7-6 0-9.3-4.6-10.5-7 .5-1.1 1.4-2.5 2.9-3.7L2 4.3zM12 8c2.2 0 4 1.8 4 4 0 .4-.1.8-.2 1.2l-5-5c.4-.1.8-.2 1.2-.2zm-3.8 1.6 1.5 1.5c-.1.3-.1.6-.1.9a2.3 2.3 0 0 0 2.8 2.8l1.5 1.5c-.6.2-1.2.4-1.9.4-2.2 0-4-1.8-4-4 0-.7.1-1.3.3-1.9z"/></svg>
        </button>
      </div>
      <button id="goOnline" class="primary big">Go online</button>
      <p class="hint" id="loginHint" role="status" aria-live="assertive"></p>
    </section>

    <!-- 2. waiting for calls -->
    <section id="waiting" class="screen center hidden">
      <div class="avatar oncall" aria-hidden="true">
        <svg viewBox="0 0 24 24" style="width:34px;height:34px;fill:var(--accent-ink)"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
      </div>
      <p class="big">Online as <strong id="waitBrand"></strong></p>
      <p class="sub">Waiting for calls. Leave this page open.</p>
      <p class="tip">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a7 7 0 0 0-7 7v5a3 3 0 0 0 3 3h1v-6H7v-2a5 5 0 0 1 10 0v2h-2v6h1a3 3 0 0 0 3-3v-5a7 7 0 0 0-7-7z"/></svg>
        Use headphones for the best call quality. It stops callers hearing an echo.
      </p>
      <p class="hint" id="waitHint" role="status"></p>
    </section>

    <!-- 3. incoming call -->
    <section id="incoming" class="screen center hidden">
      <div class="avatar ringing" aria-hidden="true">
        <svg viewBox="0 0 24 24" style="width:34px;height:34px;fill:var(--accent-ink)"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
      </div>
      <p class="sub">Incoming call</p>
      <p class="big"><strong id="callSubject"></strong></p>
      <p class="note hidden" id="callNote"></p>
      <div class="row callRow">
        <button id="rejectBtn" class="danger big" aria-label="Decline call">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 9c-1.6 0-3.2.3-4.7.7v3.1c0 .4-.2.7-.6.9-1 .5-1.8 1.1-2.6 1.8-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L.3 13.1c-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7C3.3 8.8 7.5 7 12 7s8.7 1.8 11.7 4.7c.2.2.3.4.3.7 0 .3-.1.5-.3.7l-2.4 2.4c-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3-.8-.7-1.6-1.3-2.6-1.8-.4-.2-.6-.5-.6-.9V9.7C15.2 9.3 13.6 9 12 9z"/></svg>
          Decline
        </button>
        <button id="answerBtn" class="primary big" aria-label="Answer call">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
          Answer
        </button>
      </div>
    </section>

    <!-- 4. in call -->
    <section id="inCall" class="screen center hidden">
      <div class="avatar oncall" id="onCallAvatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" style="width:34px;height:34px;fill:var(--accent-ink)"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
      </div>
      <p class="timer" id="callTimer">00:00</p>

      <div class="row callRow">
        <button id="muteBtn" class="ghost big" aria-pressed="false">
          <svg class="ic-mic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z"/></svg>
          <svg class="ic-mic-off hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 11h-2a5 5 0 0 1-.4 2l1.5 1.5A7 7 0 0 0 19 11zM4.3 3 3 4.3l6 6V11a3 3 0 0 0 4.7 2.5l1.5 1.4A5 5 0 0 1 7 11H5a7 7 0 0 0 6 6.9V21h2v-3.1c1-.2 2-.5 2.8-1.1l3 2.9 1.2-1.3L4.3 3zM15 5a3 3 0 0 0-6 0v.2l6 6V5z"/></svg>
          <span id="muteLabel">Mute</span>
        </button>
        <button id="hangBtn" class="danger big" aria-label="Hang up">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 9c-1.6 0-3.2.3-4.7.7v3.1c0 .4-.2.7-.6.9-1 .5-1.8 1.1-2.6 1.8-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L.3 13.1c-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7C3.3 8.8 7.5 7 12 7s8.7 1.8 11.7 4.7c.2.2.3.4.3.7 0 .3-.1.5-.3.7l-2.4 2.4c-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3-.8-.7-1.6-1.3-2.6-1.8-.4-.2-.6-.5-.6-.9V9.7C15.2 9.3 13.6 9 12 9z"/></svg>
          Hang up
        </button>
      </div>
    </section>
  </main>

  <audio id="ncRemoteAudio" autoplay></audio>

  <script src="js/core.js?v=4"></script>
  <script src="js/console.js?v=4"></script>
</body>
</html>
