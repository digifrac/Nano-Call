<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call us</title>
  <script>(function(){var t=localStorage.getItem('nano-call.theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body class="widget">
  <main class="wphone">
    <header class="wbar">
      <span class="wbrand">
        <img id="logo" class="wlogo hidden" alt="" />
        <span class="wavatar" id="brandAvatar" aria-hidden="true"></span>
        <span class="wtitle">Call <span id="brandName">us</span></span>
      </span>
      <button class="iconBtn closeBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 6.3 17.7 4.9 16.3 11.2 10 4.9 3.7 6.3 2.3l4.3 4.3L16.9 4.3z"/></svg>
      </button>
    </header>

    <!-- 1. choose subject + note, then call -->
    <section id="intro" class="wscreen">
      <p class="lede" id="greeting"></p>

      <div class="field" id="subjectRow">
        <label for="subject">Why are you calling?</label>
        <div class="selectWrap">
          <select id="subject"></select>
          <svg class="selectChev" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="note">Add a note <span class="optional">(optional)</span></label>
        <textarea id="note" rows="2" maxlength="280" placeholder="A short note for whoever answers"></textarea>
      </div>

      <button id="callBtn" class="primary big callCta">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
        <span class="label">Call us</span>
      </button>
      <p class="hint" id="callHint" role="status"></p>

      <p class="trust">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3zm0 6a2 2 0 0 1 1 3.7V14a1 1 0 1 1-2 0v-2.3A2 2 0 0 1 12 8z"/></svg>
        Private, end to end encrypted. Nothing to install.
      </p>
    </section>

    <!-- 2. calling (ringing) -->
    <section id="calling" class="wscreen center hidden">
      <span class="orb ringing"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.7 3.9 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg></span>
      <p class="big">Calling <strong id="callingBrand"></strong></p>
      <p class="subjectChip" id="callingSubject"></p>
      <button id="cancelBtn" class="ghost big">Cancel</button>
    </section>

    <!-- 3. in call -->
    <section id="inCall" class="wscreen center hidden">
      <span class="orb live"><span class="liveDot"></span></span>
      <p class="status">Connected</p>
      <p class="timer" id="callTimer">00:00</p>

      <div class="row callRow">
        <button id="muteBtn" class="ghost big" aria-pressed="false">
          <svg class="ic-mic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z"/></svg>
          <svg class="ic-mic-off hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 11h-2a5 5 0 0 1-.4 2l1.5 1.5A7 7 0 0 0 19 11zM4.3 3 3 4.3l6 6V11a3 3 0 0 0 4.7 2.5l1.5 1.4A5 5 0 0 1 7 11H5a7 7 0 0 0 6 6.9V21h2v-3.1c1-.2 2-.5 2.8-1.1l3 2.9 1.2-1.3L4.3 3zM15 5a3 3 0 0 0-6 0v.2l6 6V5z"/></svg>
          <span id="muteLabel">Mute</span>
        </button>
        <button id="hangBtn" class="danger big" aria-label="Hang up">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 9c-1.6 0-3.2.3-4.7.7v3.1c0 .4-.2.7-.6.9-1 .5-1.8 1.1-2.6 1.8-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L.3 13.1c-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7C3.3 8.8 7.5 7 12 7s8.7 1.8 11.7 4.7c.2.2.3.4.3.7 0 .3-.1.5-.3.7l-2.4 2.4c-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3-.8-.7-1.6-1.3-2.6-1.8-.4-.2-.6-.5-.6-.9V9.7C15.2 9.3 13.6 9 12 9z"/></svg>
          Hang up
        </button>
      </div>
    </section>

    <!-- 4. ended -->
    <section id="ended" class="wscreen center hidden">
      <span class="orb done"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 9c-1.6 0-3.2.3-4.7.7v3.1c0 .4-.2.7-.6.9-1 .5-1.8 1.1-2.6 1.8-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3L.3 13.1c-.2-.2-.3-.4-.3-.7 0-.3.1-.5.3-.7C3.3 8.8 7.5 7 12 7s8.7 1.8 11.7 4.7c.2.2.3.4.3.7 0 .3-.1.5-.3.7l-2.4 2.4c-.2.2-.4.3-.7.3-.3 0-.5-.1-.7-.3-.8-.7-1.6-1.3-2.6-1.8-.4-.2-.6-.5-.6-.9V9.7C15.2 9.3 13.6 9 12 9z"/></svg></span>
      <p class="big" id="endMsg">Call ended.</p>
      <div class="row callRow">
        <button id="againBtn" class="ghost big">Call again</button>
        <button class="primary big closeBtn">Close</button>
      </div>
    </section>

    <p class="poweredBy hidden" id="poweredBy">
      Powered by <a href="https://www.digitalfracture.co.uk/nano.php" target="_blank" rel="noopener noreferrer">Nano Call</a>.
      Developed by <a href="https://digitalfracture.co.uk/" target="_blank" rel="noopener noreferrer">Digital Fracture</a>.
    </p>
  </main>

  <audio id="ncRemoteAudio" autoplay></audio>

  <script src="js/core.js?v=4"></script>
  <script src="js/widget.js?v=4"></script>
</body>
</html>
